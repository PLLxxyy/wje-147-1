<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>户外露营装备租赁平台</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; min-height: 100vh; }
      a { color: #1890ff; text-decoration: none; }
      a:hover { color: #40a9ff; }
      button { cursor: pointer; border: none; font-family: inherit; font-size: 14px; }
      input, select, textarea { font-family: inherit; font-size: 14px; }
      #root { min-height: 100vh; display: flex; flex-direction: column; }

      /* ========== Layout ========== */
      .navbar { background: #001529; color: #fff; padding: 0 24px; display: flex; align-items: center; height: 56px; position: sticky; top: 0; z-index: 100; }
      .navbar-brand { font-size: 18px; font-weight: 700; color: #fff; margin-right: 32px; white-space: nowrap; }
      .navbar-brand span { color: #52c41a; }
      .navbar-nav { display: flex; align-items: center; gap: 4px; flex: 1; }
      .navbar-nav a, .navbar-nav button { color: rgba(255,255,255,.85); padding: 8px 16px; border-radius: 6px; background: none; transition: all .2s; font-size: 14px; }
      .navbar-nav a:hover, .navbar-nav button:hover, .navbar-nav a.active { background: rgba(255,255,255,.12); color: #fff; }
      .navbar-right { display: flex; align-items: center; gap: 12px; margin-left: auto; }
      .navbar-right .user-tag { background: rgba(82,196,26,.2); color: #52c41a; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
      .navbar-right .user-tag.admin { background: rgba(250,173,20,.2); color: #faad14; }

      .container { max-width: 1200px; margin: 0 auto; padding: 24px; flex: 1; width: 100%; }
      .page-header { margin-bottom: 24px; }
      .page-header h1 { font-size: 24px; font-weight: 700; color: #001529; }
      .page-header p { color: #666; margin-top: 4px; }

      /* ========== Cards ========== */
      .card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px; }
      .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      .card-header h2 { font-size: 16px; font-weight: 600; }

      /* ========== Grid ========== */
      .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
      .grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }

      /* ========== Gear Card ========== */
      .gear-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.06); transition: all .25s; display: flex; flex-direction: column; }
      .gear-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }
      .gear-card-img { height: 180px; background: linear-gradient(135deg, #e8f5e9, #b2dfdb); display: flex; align-items: center; justify-content: center; font-size: 48px; color: #4caf50; position: relative; }
      .gear-card-img .sold-out { position: absolute; top: 10px; right: 10px; background: #ff4d4f; color: #fff; font-size: 12px; padding: 2px 10px; border-radius: 10px; }
      .gear-card-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
      .gear-card-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
      .gear-card-brand { font-size: 12px; color: #999; margin-bottom: 8px; }
      .gear-card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
      .gear-card-price { color: #f5222d; font-size: 18px; font-weight: 700; }
      .gear-card-price small { font-size: 12px; font-weight: 400; color: #999; }
      .gear-card-stock { font-size: 12px; color: #52c41a; }
      .gear-card-stock.empty { color: #ff4d4f; }

      /* ========== Category Tags ========== */
      .category-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
      .category-tab { padding: 6px 18px; border-radius: 20px; border: 1px solid #d9d9d9; background: #fff; color: #666; cursor: pointer; transition: all .2s; font-size: 13px; }
      .category-tab:hover { border-color: #1890ff; color: #1890ff; }
      .category-tab.active { background: #1890ff; color: #fff; border-color: #1890ff; }

      /* ========== Forms ========== */
      .form-group { margin-bottom: 16px; }
      .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #333; }
      .form-group label .required { color: #f5222d; margin-left: 2px; }
      .form-input { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; outline: none; transition: border-color .2s; }
      .form-input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,.15); }
      .form-input::placeholder { color: #bbb; }
      textarea.form-input { min-height: 80px; resize: vertical; }
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .form-error { color: #f5222d; font-size: 12px; margin-top: 4px; }

      /* ========== Buttons ========== */
      .btn { padding: 8px 20px; border-radius: 6px; font-weight: 500; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
      .btn-primary { background: #1890ff; color: #fff; }
      .btn-primary:hover { background: #40a9ff; }
      .btn-success { background: #52c41a; color: #fff; }
      .btn-success:hover { background: #73d13d; }
      .btn-danger { background: #ff4d4f; color: #fff; }
      .btn-danger:hover { background: #ff7875; }
      .btn-warning { background: #faad14; color: #fff; }
      .btn-warning:hover { background: #ffc53d; }
      .btn-default { background: #f0f0f0; color: #666; }
      .btn-default:hover { background: #e0e0e0; }
      .btn-sm { padding: 4px 12px; font-size: 12px; }
      .btn-lg { padding: 12px 32px; font-size: 16px; }
      .btn:disabled { opacity: .5; cursor: not-allowed; }
      .btn-block { width: 100%; justify-content: center; }

      /* ========== Auth Pages ========== */
      .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #001529 0%, #003a70 100%); }
      .auth-box { background: #fff; border-radius: 12px; padding: 40px; width: 400px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
      .auth-box h1 { text-align: center; font-size: 22px; margin-bottom: 8px; color: #001529; }
      .auth-box .sub { text-align: center; color: #999; font-size: 13px; margin-bottom: 28px; }
      .auth-box .toggle { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
      .auth-box .toggle a { cursor: pointer; }

      /* ========== Table ========== */
      .table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th { background: #fafafa; text-align: left; padding: 12px 16px; font-weight: 600; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
      td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
      tr:hover td { background: #f5f5f5; }

      /* ========== Status Tags ========== */
      .tag { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
      .tag-pending { background: #fff7e6; color: #fa8c16; }
      .tag-confirmed { background: #e6f7ff; color: #1890ff; }
      .tag-renting { background: #f6ffed; color: #52c41a; }
      .tag-returned { background: #f0f0f0; color: #666; }
      .tag-completed { background: #f0f0f0; color: #333; }
      .tag-damaged { background: #fff1f0; color: #f5222d; }
      .tag-cancelled { background: #f0f0f0; color: #999; }

      /* ========== Search Bar ========== */
      .search-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
      .search-input { flex: 1; padding: 10px 16px; border: 1px solid #d9d9d9; border-radius: 8px; outline: none; font-size: 14px; transition: border-color .2s; }
      .search-input:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,.1); }

      /* ========== Stat Card ========== */
      .stat-card { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
      .stat-card .stat-label { font-size: 13px; color: #999; margin-bottom: 8px; }
      .stat-card .stat-value { font-size: 28px; font-weight: 700; color: #001529; }
      .stat-card .stat-sub { font-size: 12px; color: #999; margin-top: 4px; }
      .stat-card.green .stat-value { color: #52c41a; }
      .stat-card.blue .stat-value { color: #1890ff; }
      .stat-card.orange .stat-value { color: #fa8c16; }
      .stat-card.red .stat-value { color: #f5222d; }

      /* ========== Empty State ========== */
      .empty-state { text-align: center; padding: 60px 20px; color: #999; }
      .empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: .3; }
      .empty-state p { font-size: 14px; }

      /* ========== Detail Page ========== */
      .detail-img { width: 100%; height: 300px; background: linear-gradient(135deg, #e8f5e9, #b2dfdb); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 80px; color: #4caf50; margin-bottom: 20px; }
      .detail-info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
      .detail-info-item { font-size: 14px; }
      .detail-info-item .label { color: #999; font-size: 12px; margin-bottom: 2px; }
      .detail-info-item .value { font-weight: 600; }
      .price-big { font-size: 32px; font-weight: 700; color: #f5222d; }
      .price-big small { font-size: 14px; color: #999; font-weight: 400; }

      /* ========== Modal ========== */
      .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.45); z-index: 1000; display: flex; align-items: center; justify-content: center; }
      .modal { background: #fff; border-radius: 12px; padding: 28px; width: 500px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
      .modal h2 { font-size: 18px; margin-bottom: 20px; }
      .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

      /* ========== Order Timeline ========== */
      .order-status-bar { display: flex; align-items: center; gap: 8px; margin: 12px 0; padding: 12px 16px; background: #fafafa; border-radius: 8px; }
      .order-status-step { font-size: 13px; color: #999; padding: 4px 12px; border-radius: 12px; }
      .order-status-step.done { background: #52c41a; color: #fff; }
      .order-status-step.current { background: #1890ff; color: #fff; }
      .order-status-arrow { color: #d9d9d9; }

      /* ========== Responsive ========== */
      @media (max-width: 768px) {
        .container { padding: 12px; }
        .grid-3, .grid-4 { grid-template-columns: 1fr; }
        .form-row { grid-template-columns: 1fr; }
        .stat-grid { grid-template-columns: 1fr 1fr; }
        .detail-info { grid-template-columns: 1fr; }
        .navbar-nav { gap: 0; }
        .navbar-nav a, .navbar-nav button { padding: 6px 10px; font-size: 13px; }
      }

      /* ========== Misc ========== */
      .mb-8 { margin-bottom: 8px; }
      .mb-16 { margin-bottom: 16px; }
      .mb-24 { margin-bottom: 24px; }
      .text-center { text-align: center; }
      .text-right { text-align: right; }
      .text-muted { color: #999; }
      .text-danger { color: #f5222d; }
      .flex { display: flex; }
      .flex-between { display: flex; justify-content: space-between; align-items: center; }
      .gap-8 { gap: 8px; }
      .gap-16 { gap: 16px; }
      .mt-16 { margin-top: 16px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
